# claude-email-hook configuration
# Generated by install.sh, or edit manually

smtp:
  provider: "126"           # 126 / qq / gmail / outlook / custom
  user: ""                  # sender email address
  password: ""              # SMTP authorization code (not login password)

notifications:
  realtime:
    to: ""                  # Email A: receives realtime task notifications
    events:
      - "Stop"
      - "Notification"
  digest:
    enabled: false
    to: ""                  # Email B: receives daily digest
    cron: "0 20 * * *"      # default: 8pm daily

summary:
  model: "claude-haiku-4-5-20251001"

tracker:
  enabled: true
